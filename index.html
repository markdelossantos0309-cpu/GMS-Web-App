<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GMS Pro v2.0 | Fleet Management</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="loadingOverlay">
      <div class="spinner-circle"></div>
    </div>

    <div id="login-screen">
      <div class="login-box text-center">
        <img
          src="https://via.placeholder.com/180x60?text=GENESIS+LOGO"
          alt="Logo"
          style="width: 180px; margin-bottom: 20px"
        />
        <h3 class="text-info fw-bold mb-4">GMS LOGIN</h3>

        <div class="mb-3 text-start">
          <label class="small text-secondary mb-1">Username</label>
          <input type="text" id="user" class="form-control" />
        </div>

        <div class="mb-2 text-start">
          <label class="small text-secondary mb-1">Password</label>
          <input type="password" id="pass" class="form-control" />
        </div>

        <div id="login-error" class="text-start mb-3" style="display: none">
          <small class="text-danger"
            ><i class="bi bi-exclamation-circle me-1"></i>
            <span id="error-text"></span
          ></small>
        </div>

        <button id="login-btn" class="btn btn-info w-100 fw-bold py-2 mt-2">
          SIGN IN
        </button>
      </div>
    </div>

    <div id="main-system" style="display: none">
      <div class="top-header">
        <div class="d-flex align-items-center gap-3 text-white">
          <div id="user-display" class="fw-bold small"></div>
          <button
            class="btn btn-outline-danger btn-sm border-0"
            id="logout-btn"
          >
            <i class="bi bi-power fs-5"></i>
          </button>
        </div>
      </div>

      <div class="sidebar" id="sidebar">
        <div class="sidebar-brand-box">
          <h4 class="text-info">GMS FLEET</h4>
        </div>
        <div id="sidebar-menu"></div>
      </div>

      <div class="main-content">
        <div id="display-area"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="index.js"></script>
  </body>
</html>
